repos:
  - repo: https://github.com/ministryofjustice/devsecops-hooks
    rev: v1.6.0 # re-run prek install after changing this
    hooks:
      - id: baseline
        env:
          STAGE_MODE: 'true' # This is the default, which is to check only the files that have been staged.
  - repo: local
    hooks:
      - id: rubocop
        name: Rubocop
        language: system
        entry: bundle exec rubocop --force-exclusion
      - id: stylelint
        name: StyleLint
        entry: yarn run stylelint
        language: system
        types: [ scss ]
        files: "\\.scss"
      - id: erblint
        name: ErbLint
        entry: bundle exec rake erb_lint
        language: system
        files: "\\.html.erb"
      - id: standard_js
        name: StandardJS
        entry: yarn run standard
        language: system
        files: "\\.js"
        pass_filenames: false
